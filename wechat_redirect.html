<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
    :root {
        --primary: #0366d6;
        --text: black;
    }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: white;
        color: var(--text);
    }

    .content {
        padding: 24px;
        text-align: center;
    }

    .arrow {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 60px;
        transform: rotate(-45deg);
        color: var(--primary);
    }

    .title {
        font-size: 22px;
        font-weight: 600;
        margin-top: 80px;
        color: var(--text);
    }

    .desc {
        font-size: 16px;
        margin-top: 16px;
        line-height: 1.6;
        color: #aaa;
    }

    .highlight {
        color: var(--primary);
        font-weight: bold;
    }

    .fallback {
        position: absolute;
        bottom: 40px;
        left: 0;
        right: 0;
        font-size: 14px;
        color: #aaa;
    }

    @media (max-width: 768px) {
        .content {
            margin: -20px 20px 0;
            padding: 1.5rem;
        }
    }

    @media (max-height: 800px) {
        .header {
            min-height: 150px;
        }
        .content {
            margin-top: -20px;
        }
    }
</style>
</head>

<body>

<div id="overlay">
  <div class="arrow">➤</div>

  <div class="content">
    <div class="title">Open in Safari</div>
    <div class="desc">
      Tap the <span class="highlight">•••</span> menu in the top right<br>
      Then select <span class="highlight">"Open in Safari"</span>
    </div>
  </div>

  <div class="fallback">
    This step is required to continue
  </div>
</div>

<script>
  function isWeChat() {
    return /MicroMessenger/i.test(navigator.userAgent);
  }

  function isIOS() {
    return /iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function getTargetUrl() {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('target');
    return raw ? decodeURIComponent(raw) : null;
  }

  function safeRedirect(url) {
    try {
      const parsed = new URL(url);
      window.location.replace(parsed.href);
    } catch (e) {
      document.body.innerHTML = "<h3 style='color:#000;background:#fff;padding:20px;'>Invalid target URL</h3>";
    }
  }

  function showOverlay() {
    const overlay = document.getElementById('overlay');
    overlay.style.display = 'block';

    if (!isIOS()) {
      document.querySelector('.title').innerText = "Open in Browser";
      document.querySelector('.desc').innerHTML =
        'Tap the <span class="highlight">•••</span> menu<br>Then choose <span class="highlight">"Open in Browser"</span>';
    }
  }

  function init() {
    const target = getTargetUrl();

    if (!target) {
      document.body.innerHTML = "<h3 style='color:#000;background:#fff;padding:20px;'>Missing target parameter</h3>";
      return;
    }

    if (isWeChat()) {
      showOverlay();
    } else {
      safeRedirect(target);
    }
  }

  init();
</script>

</body>
</html>
